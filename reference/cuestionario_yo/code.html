<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Relational Sanctuary - Questionnaire</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#c5d5f7",
              "on-background": "#252f41",
              "secondary-fixed": "#bfd1ff",
              "primary-fixed": "#b6a4fd",
              "on-error-container": "#510017",
              "surface-container-low": "#ecf0ff",
              "on-primary": "#f6f0ff",
              "on-primary-fixed": "#1a0057",
              "on-tertiary-fixed-variant": "#6e422c",
              "outline": "#6d778c",
              "on-secondary-container": "#054496",
              "on-tertiary-fixed": "#4c2613",
              "surface-container-high": "#d6e3ff",
              "surface": "#f5f6ff",
              "primary-dim": "#534293",
              "on-secondary": "#f0f2ff",
              "tertiary-fixed-dim": "#eeb095",
              "secondary-dim": "#174d9f",
              "tertiary-container": "#febea2",
              "inverse-surface": "#040e1f",
              "primary-container": "#b6a4fd",
              "secondary-container": "#bfd1ff",
              "inverse-on-surface": "#939db3",
              "secondary-fixed-dim": "#aac3ff",
              "outline-variant": "#a3adc4",
              "on-error": "#ffefef",
              "background": "#f5f6ff",
              "error": "#b41340",
              "error-dim": "#a70138",
              "error-container": "#f74b6d",
              "surface-container-highest": "#ceddfe",
              "inverse-primary": "#b6a4fd",
              "on-primary-container": "#342172",
              "surface-bright": "#f5f6ff",
              "on-surface": "#252f41",
              "on-secondary-fixed": "#003172",
              "tertiary-fixed": "#febea2",
              "on-surface-variant": "#525c70",
              "surface-container": "#dfe8ff",
              "tertiary": "#7f503a",
              "surface-container-lowest": "#ffffff",
              "surface-variant": "#ceddfe",
              "on-tertiary-container": "#643924",
              "primary": "#5f4fa0",
              "tertiary-dim": "#72442f",
              "surface-tint": "#5f4fa0",
              "primary-fixed-dim": "#a897ee",
              "on-primary-fixed-variant": "#3d2b7b",
              "on-secondary-fixed-variant": "#194ea0",
              "on-tertiary": "#fff0ea",
              "secondary": "#2959ab"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
      }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Anchor (Manual suppression check: Focused task, only TopAppBar logo/close) -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl px-8 h-20 max-w-screen-2xl mx-auto flex justify-between items-center shadow-[0_12px_40px_rgba(37,47,65,0.06)]">
<div class="flex items-center gap-2">
<span class="text-xl font-semibold tracking-tight text-[#252f41] dark:text-slate-100 font-headline">Relational Sanctuary</span>
</div>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-[#f5f6ff] transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center pt-32 pb-24 px-6 md:px-12 max-w-3xl mx-auto w-full">
<!-- Progress Header -->
<div class="w-full mb-12 space-y-4">
<div class="flex justify-between items-end mb-2">
<span class="font-label text-xs uppercase tracking-[0.2em] text-primary font-semibold">Question 5 of 12</span>
<span class="font-label text-xs font-medium text-on-surface-variant">42% Complete</span>
</div>
<div class="h-2 w-full bg-surface-container-low rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-primary-container w-[42%] rounded-full"></div>
</div>
</div>
<!-- Dimension Indicator -->
<div class="inline-flex items-center px-4 py-2 rounded-full bg-primary/10 text-primary mb-6">
<span class="material-symbols-outlined text-sm mr-2" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="font-label text-xs font-bold uppercase tracking-widest">Dimension: Communication</span>
</div>
<!-- Question Card -->
<div class="w-full space-y-10 text-center md:text-left">
<h1 class="text-3xl md:text-5xl font-headline font-semibold text-on-surface leading-tight tracking-tight">
                When we have a disagreement, I usually...
            </h1>
<!-- Scenario Card (Asymmetric Layout) -->
<div class="relative group max-w-xl mx-auto md:ml-0 md:mr-auto">
<div class="absolute -inset-1 bg-gradient-to-r from-primary-container to-secondary-container rounded-lg blur opacity-10 group-hover:opacity-20 transition duration-1000"></div>
<div class="relative bg-surface-container-lowest p-6 rounded-lg shadow-sm border border-outline-variant/10">
<div class="flex items-start gap-4">
<div class="bg-tertiary-container/20 p-2 rounded-md">
<span class="material-symbols-outlined text-tertiary">lightbulb</span>
</div>
<div class="text-left">
<p class="font-label text-xs font-bold text-tertiary uppercase tracking-wider mb-1">Scenario Moment</p>
<p class="text-on-surface-variant text-sm leading-relaxed">
                                Imagine you both had a long, stressful day at work and one of you forgets an important shared chore. How do you approach the tension?
                            </p>
</div>
</div>
</div>
</div>
<!-- Likert Scale (Reachability Optimized) -->
<div class="grid grid-cols-1 gap-4 w-full mt-12">
<!-- Strongly Disagree -->
<button class="w-full group flex items-center justify-between p-5 rounded-xl bg-surface-container-low hover:bg-white hover:shadow-lg transition-all duration-300 border border-transparent hover:border-primary-container/30 text-left">
<span class="flex flex-col">
<span class="font-headline text-lg font-medium text-on-surface">Strongly Disagree</span>
<span class="font-label text-xs text-on-surface-variant opacity-60">I rarely feel this way</span>
</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center transition-colors">
<div class="w-3 h-3 rounded-full bg-primary scale-0 group-hover:scale-100 transition-transform"></div>
</div>
</button>
<!-- Disagree -->
<button class="w-full group flex items-center justify-between p-5 rounded-xl bg-surface-container-low hover:bg-white hover:shadow-lg transition-all duration-300 border border-transparent hover:border-primary-container/30 text-left">
<span class="font-headline text-lg font-medium text-on-surface">Disagree</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center transition-colors">
<div class="w-3 h-3 rounded-full bg-primary scale-0 group-hover:scale-100 transition-transform"></div>
</div>
</button>
<!-- Neutral -->
<button class="w-full group flex items-center justify-between p-5 rounded-xl bg-surface-container-low hover:bg-white hover:shadow-lg transition-all duration-300 border border-transparent hover:border-primary-container/30 text-left">
<span class="font-headline text-lg font-medium text-on-surface">Neutral</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center transition-colors">
<div class="w-3 h-3 rounded-full bg-primary scale-0 group-hover:scale-100 transition-transform"></div>
</div>
</button>
<!-- Agree -->
<button class="w-full group flex items-center justify-between p-5 rounded-xl bg-surface-container-low hover:bg-white hover:shadow-lg transition-all duration-300 border border-transparent hover:border-primary-container/30 text-left">
<span class="font-headline text-lg font-medium text-on-surface">Agree</span>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant group-hover:border-primary flex items-center justify-center transition-colors">
<div class="w-3 h-3 rounded-full bg-primary scale-0 group-hover:scale-100 transition-transform"></div>
</div>
</button>
<!-- Strongly Agree -->
<button class="w-full group flex items-center justify-between p-5 rounded-xl bg-white shadow-xl shadow-primary/10 border-2 border-primary text-left">
<span class="flex flex-col">
<span class="font-headline text-lg font-semibold text-primary">Strongly Agree</span>
<span class="font-label text-xs text-primary/60">This perfectly describes us</span>
</span>
<div class="w-6 h-6 rounded-full border-2 border-primary bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-white text-sm" style="font-variation-settings: 'wght' 700;">check</span>
</div>
</button>
</div>
</div>
</main>
<!-- Footer Actions (Stuck to bottom on mobile, floating on desktop) -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-2xl flex flex-col md:flex-row justify-between items-center px-8 pb-8 pt-4 gap-4">
<button class="order-2 md:order-1 font-label text-sm font-semibold text-on-surface-variant hover:text-on-surface transition-colors px-6 py-3">
            Skip for now
        </button>
<div class="order-1 md:order-2 flex gap-4 w-full md:w-auto">
<button class="flex-1 md:flex-initial h-14 px-10 rounded-xl bg-gradient-to-r from-primary to-primary-dim text-white font-headline font-semibold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
<span>Next Question</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</footer>
<!-- Decorative Editorial Background Element -->
<div class="fixed top-[15%] -right-20 w-96 h-96 bg-primary-container/10 rounded-full blur-3xl -z-10 pointer-events-none"></div>
<div class="fixed bottom-[10%] -left-20 w-64 h-64 bg-secondary-container/10 rounded-full blur-3xl -z-10 pointer-events-none"></div>
</body></html>
